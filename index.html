<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eduskillnova</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#0f172a,#020617);
color:white;
}

.header{
padding:20px;
background:#111827;
display:flex;
justify-content:space-between;
}

.logo{
color:#38bdf8;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:#1f2937;
padding:15px;
margin:10px 0;
border-radius:10px;
}

input{
padding:10px;
width:70%;
border-radius:8px;
border:none;
}

button{
padding:10px;
background:#38bdf8;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">🚀 Eduskillnova</div>
</div>

<div class="container">

<h2>AI Tutor</h2>

<input id="msg" placeholder="Ask anything">
<button onclick="ask()">Send</button>

<div id="chat"></div>

<hr>

<h2>Mock Tests</h2>
<div class="card">Q1: Ultra Vires Doctrine</div>
<div class="card">Q2: Indoor Management Rule</div>

<hr>

<h2>Leaderboard</h2>
<div id="leader"></div>

</div>

<script>

async function ask(){
let msg=document.getElementById("msg").value;

document.getElementById("chat").innerHTML+=
`<p>You: ${msg}</p>`;

const res = await fetch("https://YOUR-BACKEND-URL.onrender.com/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
});

const data=await res.json();

document.getElementById("chat").innerHTML+=
`<p>AI: ${data.answer}</p>`;
}

let users=[
{name:"Aman",score:95},
{name:"Ravi",score:85},
{name:"Priya",score:80}
];

document.getElementById("leader").innerHTML=
users.map(u=>`<p>${u.name} - ${u.score}</p>`).join("");

</script>

</body>
</html>
