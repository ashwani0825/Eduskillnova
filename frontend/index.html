<!DOCTYPE html>
<html>
<head>
<title>Eduskillnova</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#0f172a,#020617);
color:white;
}

header{
padding:20px;
background:#111827;
}

.logo{
color:#38bdf8;
font-weight:bold;
}

.container{
padding:20px;
}

input{
padding:10px;
width:70%;
border-radius:8px;
border:none;
}

button{
padding:10px;
background:#38bdf8;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.card{
background:#1f2937;
padding:15px;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<div class="logo">🚀 Eduskillnova</div>
</header>

<div class="container">

<h2>AI Tutor</h2>

<input id="msg" placeholder="Ask anything">
<button onclick="ask()">Send</button>

<div id="chat"></div>

<script>
async function ask(){
let msg=document.getElementById("msg").value;

document.getElementById("chat").innerHTML += `<p>You: ${msg}</p>`;

const res = await fetch("https://YOUR-BACKEND-URL.onrender.com/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
});

const data=await res.json();

document.getElementById("chat").innerHTML += `<p>AI: ${data.answer}</p>`;
}
</script>

</div>

</body>
</html>
